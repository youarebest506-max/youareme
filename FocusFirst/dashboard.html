<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusFirst Dashboard</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    body {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      text-align: center;
      padding: 24px;
    }
    .stat-value {
      font-size: 36px;
      margin-top: 8px;
    }
    .history-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--card-bg);
    }
    .coupon-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 8px;
      background-color: var(--card-bg);
    }
  </style>
</head>
<body>

  <h1>🎯 FocusFirst Dashboard</h1>

  <div class="stats-grid">
    <div class="card stat-card">
      <div class="text-muted">🪙 Points</div>
      <div id="dash-points" class="stat-value text-gold">0</div>
    </div>
    <div class="card stat-card">
      <div class="text-muted">🔥 Streak</div>
      <div id="dash-streak" class="stat-value">0 days</div>
    </div>
    <div class="card stat-card">
      <div class="text-muted">✅ Goals done</div>
      <div id="dash-goals" class="stat-value">0</div>
    </div>
  </div>

  <div style="display: flex; gap: 32px; flex-wrap: wrap;">
    <!-- History Column -->
    <div style="flex: 1; min-width: 300px;">
      <h2>📜 History</h2>
      <div class="card" id="history-container">
        <!-- History items injected here -->
      </div>
    </div>

    <!-- Coupons Column -->
    <div style="flex: 1; min-width: 300px;">
      <h2>🎁 Rewards (redeem points)</h2>
      <div id="coupons-container">
        <!-- Coupons injected here -->
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
